name: Build & Release RetakesPlugin

on:
  push:
    branches: ["master"]
    paths:
      - "**.cs"
      - "**.csproj"
      - ".github/workflows/plugin-build.yml"
  pull_request:
    branches: ["master"]
    paths:
      - "**.cs"
      - "**.csproj"
  release:
    types:
      - created
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Must match TargetFramework in RetakesPlugin.csproj (net10.0)
          dotnet-version: "10.0.x"

      - name: Remove stale global NuGet sources
        # The GitHub runner may carry a user-level NuGet.Config that still
        # references C:/local-nuget (a Windows-only temporary feed). Disabling
        # it here prevents NU1301 before our solution-level config takes over.
        run: |
          dotnet nuget list source || true
          dotnet nuget disable source "local-css" || true
        continue-on-error: true

      - name: Restore (with GitHub Packages auth)
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet restore GardenRetakes.sln --configfile NuGet.config

      - name: Build entire solution
        run: dotnet build GardenRetakes.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test GardenRetakes.sln --configuration Release --no-build

      # ------------------------------------------------------------------ #
      # Package: with map configs (recommended for new installs)
      # ------------------------------------------------------------------ #
      - name: Assemble release package (with map configs)
        run: |
          PLUGIN_DIR=output/addons/counterstrikesharp/plugins/RetakesPlugin
          SHARED_DIR=output/addons/counterstrikesharp/shared/RetakesPluginShared
          mkdir -p "$PLUGIN_DIR" "$SHARED_DIR"

          # Main DLL + all runtime dependencies (EF Core, MySQL driver, etc.)
          cp ./RetakesPlugin/bin/Release/net10.0/*.dll  "$PLUGIN_DIR/"
          cp ./RetakesPlugin/bin/Release/net10.0/*.pdb  "$PLUGIN_DIR/" 2>/dev/null || true

          # Exclude the CSS API dll (already present on any CSS server)
          rm -f "$PLUGIN_DIR/CounterStrikeSharp.API.dll"

          # Config templates, lang files, map spawns
          cp -r ./RetakesPlugin/lang         "$PLUGIN_DIR/"
          cp -r ./RetakesPlugin/map_config   "$PLUGIN_DIR/"

          # Shared plugin interface
          cp ./RetakesPluginShared/bin/Release/net10.0/RetakesPluginShared.dll      "$SHARED_DIR/"
          cp ./RetakesPluginShared/bin/Release/net10.0/RetakesPluginShared.pdb      "$SHARED_DIR/" 2>/dev/null || true
          cp ./RetakesPluginShared/bin/Release/net10.0/RetakesPluginShared.deps.json "$SHARED_DIR/"

      # ------------------------------------------------------------------ #
      # Package: without map configs (for users with custom spawn setups)
      # ------------------------------------------------------------------ #
      - name: Assemble release package (no map configs)
        run: |
          PLUGIN_DIR=output-no-map-configs/addons/counterstrikesharp/plugins/RetakesPlugin
          SHARED_DIR=output-no-map-configs/addons/counterstrikesharp/shared/RetakesPluginShared
          mkdir -p "$PLUGIN_DIR" "$SHARED_DIR"

          cp ./RetakesPlugin/bin/Release/net10.0/*.dll "$PLUGIN_DIR/"
          cp ./RetakesPlugin/bin/Release/net10.0/*.pdb "$PLUGIN_DIR/" 2>/dev/null || true
          rm -f "$PLUGIN_DIR/CounterStrikeSharp.API.dll"
          cp -r ./RetakesPlugin/lang "$PLUGIN_DIR/"

          cp ./RetakesPluginShared/bin/Release/net10.0/RetakesPluginShared.dll       "$SHARED_DIR/"
          cp ./RetakesPluginShared/bin/Release/net10.0/RetakesPluginShared.pdb       "$SHARED_DIR/" 2>/dev/null || true
          cp ./RetakesPluginShared/bin/Release/net10.0/RetakesPluginShared.deps.json  "$SHARED_DIR/"

      # Always upload artifacts (available for every push / PR run)
      - name: Upload artifact (with map configs)
        uses: actions/upload-artifact@v4
        with:
          name: RetakesPlugin-${{ github.sha }}
          path: output

      - name: Upload artifact (no map configs)
        uses: actions/upload-artifact@v4
        with:
          name: RetakesPlugin-${{ github.sha }}-no-map-configs
          path: output-no-map-configs

  # ====================================================================== #
  # Release job — only runs when a GitHub Release is published
  # ====================================================================== #
  release:
    needs: build
    permissions: write-all
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download artifact (with map configs)
        uses: actions/download-artifact@v4
        with:
          name: RetakesPlugin-${{ github.sha }}
          path: ./with-map-configs

      - name: Download artifact (no map configs)
        uses: actions/download-artifact@v4
        with:
          name: RetakesPlugin-${{ github.sha }}-no-map-configs
          path: ./no-map-configs

      - name: Zip release assets
        run: |
          cd with-map-configs
          zip -r "../RetakesPlugin-${{ github.event.release.tag_name }}.zip" ./addons
          cd ../no-map-configs
          zip -r "../RetakesPlugin-${{ github.event.release.tag_name }}-no-map-configs.zip" ./addons

      - name: Attach zips to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./RetakesPlugin-${{ github.event.release.tag_name }}.zip
            ./RetakesPlugin-${{ github.event.release.tag_name }}-no-map-configs.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}